<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar</title>
    <style>
        #calendar{
            width: 600px;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            padding: 10px;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #e2e8f0;
        }
        .box{
            padding: 15px 0px;
            text-align: center;
            background-color: white;
        }
        .title{
            text-transform: uppercase;
            background-color: #3b82f6;
            color: white;
            font-weight: bold;
        }
        .days-passed{
            background-color: #f8fafc;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div id="calendar">
        <div class="box title">Dom</div>
        <div class="box title">Seg</div>
        <div class="box title">Ter</div>
        <div class="box title">Qua</div>
        <div class="box title">Qui</div>
        <div class="box title">Sex</div>
        <div class="box title">Sáb</div>
        <div class="box days-passed">29</div>
        <div class="box days-passed">30</div>
        <div class="box days-passed">31</div>
        <div class="box days">1</div>
        <div class="box days">2</div>
        <div class="box days">3</div>
        <div class="box days">4</div>
        <div class="box days">5</div>
        <div class="box days">6</div>
        <div class="box days">7</div>
        <div class="box days">8</div>
        <div class="box days">9</div>
        <div class="box days">10</div>
        <div class="box days">11</div>
        <div class="box days">12</div>
        <div class="box days">13</div>
        <div class="box days">14</div>
    </div>
</body>
</html>
