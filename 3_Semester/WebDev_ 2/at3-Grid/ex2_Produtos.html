<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body {
            display: flex;
            justify-content: center;
            padding: 10px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #container {
            display: grid;
            grid-template-columns: repeat(3, 250px);
            grid-auto-rows: auto;
            text-align: center;
            gap: 20px;
        }

        .product {
            display: flex;
            flex-direction: column;
            box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.4);
            border-radius: 5px;
            padding: 15px;
        }

        .image {
            width: 100%;
            height: 150px;
            background-color: #e2e8f0;
            border-radius: 5px;
        }

        h1{
            margin-top: 10px;
            font-size: 1.1em;
        }

        p{
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div id="container">
        <div class="product">
            <div class="image"></div>
            <h1>Smartphone</h1>
            <p>R$ 1499,99</p>
        </div>
        <div class="product">
            <div class="image"></div>
            <h1>TV OLED</h1>
            <p>R$ 14499,99</p>
        </div>
        <div class="product">
            <div class="image"></div>
            <h1>MacBook mini M4</h1>
            <p>R$ 3499,99</p>
        </div>
        <div class="product">
            <div class="image"></div>
            <h1>Mouse</h1>
            <p>R$ 149,99</p>
        </div>
        <div class="product">
            <div class="image"></div>
            <h1>Teclado Mecânico</h1>
            <p>R$ 250,00</p>
        </div>
        <div class="product">
            <div class="image"></div>
            <h1>Fone de Ouvido</h1>
            <p>R$ 101,99</p>
        </div>
    </div>
</body>

</html>
