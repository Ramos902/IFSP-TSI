<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
        }

        .container {
            padding: 10px;
            background-color: lightgray;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            grid-template-rows: 50px 400px 50px;
            gap: 10px;
        }

        header {
            background-color: #1e293b;
            color: #fff;
            grid-column: 1 / 5;

        }
        
        nav{
            grid-column: 1 / 2;
            background-color: #fff;
        }

        div#content{
            grid-column: 2 / 5;
            background-color:#fff;
        }
        
        footer{
            grid-column: 1 / 5;
            background-color:#e2e8f0;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            Cabeçulho
        </header>
        <nav>
            Navegação Lateral
        </nav>
        <div id="content">
            Conteudo Principal
        </div>
        <footer>
            Rodapé
        </footer>
    </div>
</body>

</html>
