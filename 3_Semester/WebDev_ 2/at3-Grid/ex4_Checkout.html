<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout</title>
  <style>

    body {
      font-family: sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    form {
      background: #fff;
      max-width: 700px;
      width: 100%;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);

      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .grupo {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .coluna-cheia {
      grid-column: 1 / -1;
    }

    label {
      font-size: 0.85rem;
      font-weight: bold;
      color: #475569;
    }

    input {
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #10b981;
    }

    button {
      grid-column: 1 / -1;
      background: #10b981;
      color: #fff;
      font-weight: bold;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      padding: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #059669;
    }
  </style>
</head>
<body>
  <form>
    <div class="grupo">
      <label for="nome">Nome</label>
      <input type="text" id="nome" placeholder="O seu nome" />
    </div>
    <div class="grupo">
      <label for="sobrenome">Sobrenome</label>
      <input type="text" id="sobrenome" placeholder="O seu sobrenome" />
    </div>
    <div class="grupo coluna-cheia">
      <label for="email">Endereço de E-mail</label>
      <input type="email" id="email" placeholder="email@exemplo.com" />
    </div>
    <div class="grupo coluna-cheia">
      <label for="morada">Morada Completa</label>
      <input type="text" id="morada" placeholder="Rua, Número, Andar" />
    </div>
    <div class="grupo">
      <label for="cp">Código Postal</label>
      <input type="text" id="cp" placeholder="0000-000" />
    </div>
    <div class="grupo">
      <label for="localidade">Localidade</label>
      <input type="text" id="localidade" placeholder="Sua Cidade" />
    </div>
    <button type="submit">Confirmar Pagamento</button>
  </form>
</body>
</html>
