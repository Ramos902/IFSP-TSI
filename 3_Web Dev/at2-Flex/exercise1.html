<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBox</title>
    <style>
        header{
            display: flex;
            justify-content: space-between;
            margin: 10px;
            padding: 10px 40px;
            border: 1px solid black;
            border-radius: 20px;
            background-color: #1e293c;
            font-family: Arial, Helvetica, sans-serif;
        }
        h1{
            color: #ef4444;
            text-transform: uppercase;
        }
        .div-container{
            display: flex;
            gap: 30px;
            align-items: center;
        }
        span{
            color: #cbd5e1;
            font-size: 1.5em;
        }
        span:hover{
            color: #ffff;
            cursor: pointer;
            transition: 500ms;
        }
    </style>
</head>
<body>
    <header>
        <h1>Nextflix</h1>
        <div class="div-container">
            <span class="div-1">Início</span>
            <span class="div-2">Filmes</span>
            <span class="div-3">Séries</span>
        </div>
    </header>
</body>
</html>
