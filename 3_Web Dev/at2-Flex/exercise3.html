<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise3</title>
    <style>
        main{
            display: flex;
            justify-content: space-around;
            gap: 20px;
            font-family: Arial, Helvetica, sans-serif   ;
        }
        div{
            width: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
        }
        div:hover{
            border: 1px solid #3b82f6;
            transform: scale(105%);
            transition: 500ms;
        }
        h1{
            color: #0f172a;
            font-size: 2em;
            margin: 0px;
        }
        h2{
            font-size: 2.5em;
            margin: 0px;
            color: #3b82f6;
        }
        span{

        }
        button{
            margin: 50px 0px 0px 0px;
        }
    </style>
</head>
<body>
    <main>
        <div>
            <h1>Básico</h1>
            <h2>$ 9,90/mês</h2>
            <span>Acesso a filmes em qualidade SD (480p). Apenas 1 ecrã em simultâneo. Suporte com anúncios.</span>
            <button>Assinar Básico</button>
        </div>
        <div>
            <h1>Padão</h1>
            <h2>$ 14,90/mês</h2>
            <span>Filmes em HD (1080p). Até 2 ecrãs em simultâneo. Perfeito para casais ou pequenos grupos. Sem anúncios</span>
            <button>Assinar Padrão</button>
        </div>
    </main>
</body>
</html>
