<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise2</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            font-family: Arial, Helvetica, sans-serif;
        }
        header{
            display: flex;
        }
        div{
            width: 600px;
            display: flex;
            margin: 15px;
            text-align: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        span{
            background-color: #e2e8f0;
            border-radius: 15px;
            border: 1px solid #49576b86 ;
            color: #475569;
            padding: 10px;
        }
        span:hover{
            background-color: #3b82f6;
            color: #ffff;
            transition: 400ms;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <div>
            <span>Ação</span>
            <span>Comédia</span>
            <span>Ficção Cientifica</span>
            <span>Drama</span>
            <span>Documentários</span>
            <span>Terror</span>
            <span>Romance</span>
            <span>Animação</span>
        </div>
    </header>
</body>
</html>
